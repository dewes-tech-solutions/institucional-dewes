<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Dewes Tech Solutions</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0A0A0A" />

<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />

<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    color: #F5F5F5;
    font-family: 'Geist', 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .chrome-text {
    background: linear-gradient(135deg, #F8F8F8 0%, #FFFFFF 35%, #6E6E6E 55%, #BEBEBE 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .code {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 0.6875rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #BEBEBE;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 600;
    letter-spacing: -0.045em;
    line-height: 1;
    margin-bottom: 1rem;
  }
  p {
    color: #A8A8A8;
    font-size: clamp(0.9375rem, 2vw, 1.0625rem);
    line-height: 1.6;
    max-width: 28rem;
    margin-bottom: 2.5rem;
  }
  a.btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    height: 3rem;
    padding: 0 1.5rem;
    border-radius: 0.75rem;
    background: linear-gradient(135deg, #FAFAFA 0%, #FFFFFF 40%, #D0D0D0 100%);
    color: #0A0A0A;
    font-weight: 600;
    font-size: 0.9375rem;
    text-decoration: none;
    transition: transform 0.15s ease, box-shadow 0.35s ease;
    box-shadow:
      0 1px 0 0 rgba(255,255,255,0.3) inset,
      0 -1px 0 0 rgba(0,0,0,0.12) inset,
      0 8px 24px -10px rgba(255,255,255,0.25);
  }
  a.btn:hover {
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 0 rgba(255,255,255,0.4) inset,
      0 -1px 0 0 rgba(0,0,0,0.12) inset,
      0 14px 32px -10px rgba(255,255,255,0.35);
  }
  .footer {
    position: absolute;
    bottom: 2rem;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 0.6875rem;
    color: #5A5A5A;
  }
</style>
</head>

<body>
  <div class="code">-- erro 404</div>
  <h1 class="chrome-text">Nada aqui.</h1>
  <p>A pagina que voce procura nao existe, foi movida ou nunca existiu. Verifique o endereco ou volte ao inicio.</p>
  <a href="/" class="btn">
    Voltar ao inicio
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
  </a>
  <div class="footer">dewestechsolutions.com.br</div>
</body>
</html>
