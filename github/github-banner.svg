<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="22%" cy="30%" r="95%">
      <stop offset="0%" stop-color="#1C1C1E"/>
      <stop offset="55%" stop-color="#0E0E10"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>

    <linearGradient id="chromeGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#F8F8F8"/>
      <stop offset="35%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#6E6E6E"/>
      <stop offset="100%" stop-color="#BEBEBE"/>
    </linearGradient>

    <radialGradient id="spotlight" cx="25%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="pennantBacklight" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>

    <radialGradient id="maskGrad" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="1280" height="320" fill="url(#maskGrad)"/>
    </mask>

    <filter id="pennantGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bgGrad)"/>
  <rect width="1280" height="320" fill="url(#grid)" mask="url(#gridMask)"/>
  <rect width="1280" height="320" fill="url(#spotlight)"/>

  <ellipse cx="1080" cy="160" rx="200" ry="180" fill="url(#pennantBacklight)"/>

  <!-- Pennant right side -->
  <g transform="translate(995, 78)" filter="url(#pennantGlow)">
    <g transform="scale(3)">
      <path fill="url(#chromeGrad)" fill-rule="evenodd"
        d="M 4 0 L 18 0 L 42 27 L 18 54 L 0 54 Z
           M 10 8 L 16 8 L 32 27 L 16 46 L 7 46 Z"/>
    </g>
  </g>

  <!-- Top lockup (pennant + wordmark) -->
  <g transform="translate(70, 100)">
    <g transform="scale(1.4)">
      <path fill="url(#chromeGrad)" fill-rule="evenodd"
        d="M 4 0 L 18 0 L 42 27 L 18 54 L 0 54 Z
           M 10 8 L 16 8 L 32 27 L 16 46 L 7 46 Z"/>
    </g>
    <text x="100" y="50" font-size="44">
      <tspan font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
             font-weight="600" letter-spacing="-1.8" fill="#F0F0F0">dewes</tspan><tspan
             dx="16"
             font-family="'DejaVu Sans Mono', 'Courier New', monospace"
             font-weight="400" letter-spacing="-0.8" fill="#8A8A8A">tech solutions</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="70" y="215" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" letter-spacing="-0.5" fill="#A8A8A8">
    Fábrica de software boutique · founder-led · entrega direta
  </text>

  <!-- URL line -->
  <g transform="translate(70, 260)">
    <line x1="0" y1="-10" x2="40" y2="-10" stroke="#4A4A4A" stroke-width="1"/>
    <text x="55" y="-4" font-family="'DejaVu Sans Mono', 'Courier New', monospace"
          font-size="15" font-weight="400" fill="#8A8A8A" letter-spacing="-0.3">dewestechsolutions.com.br</text>
  </g>
</svg>
