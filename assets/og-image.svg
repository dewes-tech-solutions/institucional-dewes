<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="25%" cy="20%" r="85%">
      <stop offset="0%" stop-color="#1C1C1E"/>
      <stop offset="55%" stop-color="#0E0E10"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>

    <linearGradient id="chromeGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#F8F8F8"/>
      <stop offset="35%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#6E6E6E"/>
      <stop offset="100%" stop-color="#BEBEBE"/>
    </linearGradient>

    <linearGradient id="chromeText" x1="0%" y1="10%" x2="75%" y2="90%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#D8D8D8"/>
      <stop offset="50%" stop-color="#5E5E5E"/>
      <stop offset="65%" stop-color="#9A9A9A"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>

    <radialGradient id="spotlight" cx="25%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="pennantBacklight" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <radialGradient id="maskGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="1200" height="630" fill="url(#maskGrad)"/>
    </mask>

    <filter id="pennantGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.28"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#gridMask)"/>
  <rect width="1200" height="630" fill="url(#spotlight)"/>

  <ellipse cx="1030" cy="310" rx="260" ry="240" fill="url(#pennantBacklight)"/>

  <!-- Pennant — clean right positioning -->
  <g transform="translate(915, 140)" filter="url(#pennantGlow)">
    <g transform="scale(6)">
      <path fill="url(#chromeGrad)" fill-rule="evenodd"
        d="M 4 0 L 18 0 L 42 27 L 18 54 L 0 54 Z
           M 10 8 L 16 8 L 32 27 L 16 46 L 7 46 Z"/>
    </g>
  </g>

  <!-- Top-left lockup -->
  <g transform="translate(80, 80)">
    <g transform="scale(1.3)">
      <path fill="url(#chromeGrad)" fill-rule="evenodd"
        d="M 4 0 L 18 0 L 42 27 L 18 54 L 0 54 Z
           M 10 8 L 16 8 L 32 27 L 16 46 L 7 46 Z"/>
    </g>
    <text x="92" y="32" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
          font-size="32" font-weight="600" fill="#F0F0F0" letter-spacing="-1">dewes</text>
    <text x="92" y="62" font-family="'DejaVu Sans Mono', 'Courier New', monospace"
          font-size="18" font-weight="400" fill="#8A8A8A" letter-spacing="-0.3">tech solutions</text>
  </g>

  <!-- Main headline — big statement -->
  <g transform="translate(80, 280)">
    <text font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
          font-size="56" font-weight="600" letter-spacing="-2" fill="#ECECEC">
      <tspan x="0" y="0">Software sob medida</tspan>
      <tspan x="0" y="70">que aguenta produção.</tspan>
    </text>
    <!-- Chrome closer — smaller, stands out by treatment not size -->
    <text font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
          font-size="40" font-weight="600" letter-spacing="-1.4" fill="url(#chromeText)">
      <tspan x="0" y="140">Feito por quem já colocou lá.</tspan>
    </text>
  </g>

  <!-- Bottom URL -->
  <g transform="translate(80, 555)">
    <line x1="0" y1="-10" x2="60" y2="-10" stroke="#4A4A4A" stroke-width="1"/>
    <text x="80" y="-4" font-family="'DejaVu Sans Mono', 'Courier New', monospace"
          font-size="18" font-weight="400" fill="#A8A8A8" letter-spacing="-0.2">dewestechsolutions.com.br</text>
  </g>

</svg>
