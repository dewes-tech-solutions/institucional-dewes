<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Graphite background -->
    <radialGradient id="bg" cx="28%" cy="22%" r="90%">
      <stop offset="0%" stop-color="#1C1C1E"/>
      <stop offset="55%" stop-color="#0E0E10"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>
    <!-- Chrome pennant -->
    <linearGradient id="chrome" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#F8F8F8"/>
      <stop offset="35%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#6E6E6E"/>
      <stop offset="100%" stop-color="#BEBEBE"/>
    </linearGradient>
    <!-- Subtle top-left glow -->
    <radialGradient id="glow" cx="25%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft drop shadow -->
    <filter id="pennantGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Pennant centered (~560px tall) -->
  <g transform="translate(280, 230)" filter="url(#pennantGlow)">
    <g transform="scale(10.4)">
      <path fill="url(#chrome)" fill-rule="evenodd"
        d="M 4 0 L 18 0 L 42 27 L 18 54 L 0 54 Z
           M 10 8 L 16 8 L 32 27 L 16 46 L 7 46 Z"/>
    </g>
  </g>
</svg>
